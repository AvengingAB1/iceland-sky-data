name: HARMONIE cloud + wind/precip + stations data feed

# Frequent low-latency feed: HARMONIE clouds (vedur 2.5 km), wind/precip (thattaspa),
# and station forecasts. Runs every 30 min to catch vedur's 3h HARMONIE publications
# within ~30 min of release. Fast (~2 min runtime), no rate-limit risk.

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r harmonie/requirements.txt

      - name: Extract HARMONIE cloud grids
        run: |
          mkdir -p _site
          python harmonie/extract.py --out _site/harmonie_latest.json
          touch _site/.nojekyll
          ls -lh _site

      - name: Extract wind/precip (thattaspa) grids
        continue-on-error: true
        run: |
          python harmonie/extract_elements.py --out _site/elements_latest.json
          ls -lh _site

      - name: Extract Vedur station forecasts
        run: |
          python harmonie/extract_stations.py --out _site/vedur_stations.json
          ls -lh _site

      # Copy the existing meteo_latest.json from the live site so it's preserved across
      # deploys (this workflow doesn't regenerate it — the meteo workflow handles that).
      - name: Preserve meteo_latest.json from current deploy
        continue-on-error: true
        run: |
          curl -sf "https://avengingab1.github.io/iceland-sky-data/meteo_latest.json" -o _site/meteo_latest.json && ls -lh _site/meteo_latest.json || echo "no existing meteo_latest.json to preserve"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
